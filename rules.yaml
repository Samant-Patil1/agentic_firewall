blocked_paths:
  - "~/.ssh/*"
  - "~/.aws/*"
  - "~/.env"
  - "~/.npmrc"
  - "~/.docker/config.json"
  - "~/.git-credentials"
  - "~/.netrc"
  - "/etc/passwd"
  - "/etc/shadow"
  - "*/.env"
  - "*/secrets.*"
  - "*/credentials.*"
  - "*/token.*"
  - "*/password.*"
  - "*/id_rsa*"
  - "*/id_ed25519*"
  - "*/.ssh/*"

blocked_commands:
  - "curl.*-d.*@"
  - "curl.*--data.*@"
  - "curl.*-T.*"
  - "wget.*--post-data.*"
  - "base64.*<.*(~|/\\.ssh|/\\.aws|/\\.env)"
  - "eval\\s*\\("
  - "exec\\s*\\("
  - "python.*-c.*import.*socket.*subprocess"
  - "bash.*-i.*>&.* /dev/tcp/"
  - "nc.*-e.*bash"
